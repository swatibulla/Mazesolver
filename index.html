<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Solver & Pathfinding Visualizer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <!-- Main Workspace -->
        <main class="app-main">
            <!-- Top Controls Grid -->
            <section class="top-controls-section">
                <!-- Maze Generation Card -->
                <div class="panel-card">
                    <div class="card-header">
                        <span class="card-icon">⚡</span>
                        <h3>Maze Generator</h3>
                    </div>
                    <div class="control-group">
                        <label for="sizeSlider">
                            <span>Grid Size</span>
                            <span class="value-bubble" id="sizeValue">15 × 15</span>
                        </label>
                        <div class="slider-wrapper">
                            <input type="range" id="sizeSlider" min="10" max="30" value="15">
                        </div>
                    </div>
                    <button id="generateBtn" class="btn btn-primary">
                        <span>Generate Maze</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    </button>
                </div>

                <!-- Pathfinder Card -->
                <div class="panel-card">
                    <div class="card-header">
                        <span class="card-icon">🧠</span>
                        <h3>Pathfinder</h3>
                    </div>
                    <div class="control-group">
                        <label>Select Algorithm</label>
                        <div class="select-wrapper">
                            <select id="algoSelect">
                                <option value="BFS">BFS (Breadth-First Search)</option>
                                <option value="DFS">DFS (Iterative Depth-First)</option>
                                <option value="Backtracking">Backtracking (Recursive DFS)</option>
                            </select>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="speedSlider">
                            <span>Step Delay</span>
                            <span class="value-bubble" id="speedValue">100ms</span>
                        </label>
                        <div class="slider-wrapper">
                            <input type="range" id="speedSlider" min="50" max="2000" step="50" value="100">
                        </div>
                    </div>
                    <button id="goBtn" class="btn btn-success">
                        <span>Solve Maze</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                </div>

                <!-- Live Metrics Card -->
                <div class="panel-card">
                    <div class="card-header">
                        <span class="card-icon">📊</span>
                        <h3>Live Statistics</h3>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-chip">
                            <span class="metric-label">Cells Visited</span>
                            <span class="metric-value" id="statVisited">0</span>
                        </div>
                        <div class="metric-chip">
                            <span class="metric-label">Path Length</span>
                            <span class="metric-value" id="statPath">0</span>
                        </div>
                        <div class="metric-chip">
                            <span class="metric-label">Current Cell</span>
                            <span class="metric-value" id="statPosition">-</span>
                        </div>
                        <div class="metric-chip">
                            <span class="metric-label">Target Cell</span>
                            <span class="metric-value" id="statTarget">-</span>
                        </div>
                        <div class="metric-chip full-width">
                            <span class="metric-label">Elapsed Time</span>
                            <span class="metric-value" id="statTime">0.0s</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Bottom Content Split -->
            <div class="main-workspace-split">
                <!-- Left: Code Visualizer & Variables -->
                <section class="code-visualizer-section">
                    <div class="panel-card code-card">
                        <div class="card-header">
                            <span class="card-icon">💻</span>
                            <h3>Algorithm Visualizer</h3>
                        </div>

                        <div class="code-container">
                            <div class="code-header">
                                <span class="code-lang">C</span>
                                <div class="execution-controls">
                                    <button id="pauseBtn" class="btn-icon" title="Pause / Resume" disabled>
                                        <svg class="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                        <svg class="pause-icon hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                    </button>
                                    <button id="stepBtn" class="btn-icon" title="Step Forward" disabled>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="code-editor" id="codeEditor">
                                <!-- Lines will be dynamically generated and updated here -->
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Right: Maze Visualizer Area -->
                <section class="visualizer-area">
                    <!-- Legend (Now above the maze) -->
                    <div class="legend-panel">
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #F8F7F2; border: 1px solid #d1d5db;"></span>
                            <span class="legend-label">Unvisited</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #FAC775;"></span>
                            <span class="legend-label">Exploring</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #B5D4F4;"></span>
                            <span class="legend-label">Visited</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #5DCAA5;"></span>
                            <span class="legend-label">Path</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #B4B2A9;"></span>
                            <span class="legend-label">Dead End</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #1D9E75;"></span>
                            <span class="legend-label">Start (S)</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #D85A30;"></span>
                            <span class="legend-label">End (E)</span>
                        </div>
                    </div>

                    <!-- Canvas Viewport -->
                    <div class="canvas-viewport">
                        <canvas id="maze"></canvas>
                    </div>

                    <!-- Variable Watch (Now below the maze) -->
                    <div class="panel-card variables-card">
                        <div class="variables-header">
                            <h4>Variable Watch</h4>
                            <span class="pulse-indicator hidden" id="varPulse">Live</span>
                        </div>
                        <div class="variables-grid" id="variablesGrid">
                            <div class="no-vars">Start pathfinding to watch variables.</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Core Javascript Code -->
    <script src="solver.js"></script>
</body>

</html>
